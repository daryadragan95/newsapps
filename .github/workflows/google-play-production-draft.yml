name: Google Play Production Draft

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode"
        required: true
        default: "1"
      version_name:
        description: "Android versionName"
        required: true
        default: "1.0"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/release.jks"

      - name: Restore Firebase google-services.json
        run: |
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build signed release AAB
        env:
          VERSION_CODE: ${{ inputs.version_code }}
          VERSION_NAME: ${{ inputs.version_name }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload production draft to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.newswinnerapp.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: draft
